<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación de Boda Pro</title>

<!-- =====================
CONFIGURACIÓN EDITABLE
===================== -->
<style>
:root{
--color-principal:#c9a96e;
--color-secundario:#ffffff;
--color-fondo:#f5f5f5;
--fuente-titulos:'Playfair Display', serif;
--fuente-texto:'Montserrat', sans-serif;
--imagen-portada:"https://images.unsplash.com/photo-1522673607200-164d1b6ce486";
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:var(--fuente-texto);
background:var(--color-fondo);
color:#333;
text-align:center;
}

.hero{
height:100vh;
background:url(var(--imagen-portada)) center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background-blend-mode:darken;
background-color:rgba(0,0,0,0.4);
}

h1{
font-family:var(--fuente-titulos);
font-size:3em;
margin:0;
}

.section{
padding:60px 20px;
}

.box{
background:white;
padding:25px;
border-radius:15px;
margin:20px auto;
max-width:600px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
background:var(--color-principal);
color:white;
cursor:pointer;
margin:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.countdown{
font-size:1.5em;
margin-top:10px;
}
</style>
</head>

<body>

<!-- =====================
DATOS EDITABLES
===================== -->
<script>
const datos={
novios:"María & Juan",
fecha:"Dec 20, 2026 17:00:00",
textoFecha:"20 de Diciembre 2026",
hora:"5:00 PM",
lugar:"Jardín Los Olivos",
whatsapp:"5219990000000",
mensajeWhats:"Confirmo mi asistencia",
maps:"https://www.google.com/maps?q=Jardin+Los+Olivos&output=embed",

fotos:[
"https://images.unsplash.com/photo-1519741497674-611481863552",
"https://images.unsplash.com/photo-1523430410476-0185cb1f6ff0",
"https://images.unsplash.com/photo-1504198453319-5ce911bafcde",
"https://images.unsplash.com/photo-1520857014576-2c4f4c972b57"
]
}
</script>

<!-- PORTADA -->
<div class="hero">
<h1 id="novios"></h1>
<p>¡Nos Casamos!</p>
</div>

<!-- DETALLES -->
<div class="section">
<div class="box">
<p id="fecha"></p>
<p id="hora"></p>
<p id="lugar"></p>
</div>
</div>

<!-- CUENTA REGRESIVA -->
<div class="section">
<h2>Cuenta regresiva</h2>
<div class="countdown" id="countdown"></div>
</div>

<!-- GALERIA -->
<div class="section">
<h2>Nuestra historia</h2>
<div class="gallery" id="gallery"></div>
</div>

<!-- MAPA -->
<div class="section">
<h2>Ubicación</h2>
<iframe id="mapa" width="90%" height="300" style="border:0;border-radius:15px;"></iframe>
</div>

<!-- BOTONES -->
<div class="section">
<div class="box">
<button id="btnWhats">Confirmar por WhatsApp</button>
</div>
</div>

<script>

// cargar datos
novios.innerText=datos.novios
fecha.innerText="📅 "+datos.textoFecha
hora.innerText="⏰ "+datos.hora
lugar.innerText="📍 "+datos.lugar
mapa.src=datos.maps

btnWhats.onclick=()=>{
window.open(`https://wa.me/${datos.whatsapp}?text=${encodeURIComponent(datos.mensajeWhats)}`)
}

// galeria
datos.fotos.forEach(f=>{
const img=document.createElement("img")
img.src=f

gallery.appendChild(img)
})

// contador
const wedding=new Date(datos.fecha).getTime()
setInterval(()=>{
const now=new Date().getTime()
const d=wedding-now
const dias=Math.floor(d/(1000*60*60*24))
const hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60))
const min=Math.floor((d%(1000*60*60))/(1000*60))

countdown.innerHTML=`${dias} días ${hrs} hrs ${min} min`
},1000)

</script>



<!-- MUSICA DE FONDO -->
<audio id="musica" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<!-- BOTON ACTIVAR MUSICA (por si el celular la bloquea) -->
<div style="position:fixed;bottom:20px;right:20px;">
<button onclick="document.getElementById('musica').play()">🎵 Activar música</button>
</div>

</body>
</html>
